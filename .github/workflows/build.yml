name: Build VizionAI

on:
  push:
    branches: [main, principal]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  build-apk:
    name: APK Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: VizionAI-Android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-web:
    name: Site Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build web --release --base-href /vizionai-flutter/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-web:
    name: Déployer site web
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
